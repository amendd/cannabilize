# Deploy automático na VPS ao dar push em main.
#
# Configurar no GitHub: Settings → Secrets and variables → Actions:
#   VPS_HOST     - IP ou domínio da VPS (ex: 5.189.168.66 ou cannabilize.com.br)
#   VPS_USER     - usuário SSH (ex: root)
#   VPS_SSH_KEY  - chave privada SSH (conteúdo do arquivo, ex: id_rsa)
#   VPS_APP_PATH - (opcional) pasta do app na VPS (padrão: /var/www/cannabilize)
#   VPS_PM2_NAME - (opcional) nome do app no PM2 (padrão: cannabilize)

name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          # Remove \r (Windows) para evitar "error in libcrypto" ao carregar a chave
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Testar conexão SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o BatchMode=yes \
            "$VPS_USER@$VPS_HOST" "echo 'Conexão SSH OK'" || { echo "::error::Falha na conexão SSH. Verifique VPS_HOST, VPS_USER e VPS_SSH_KEY (chave privada e authorized_keys na VPS)."; exit 1; }

      - name: Deploy na VPS
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH || '/var/www/cannabilize' }}
          VPS_PM2_NAME: ${{ secrets.VPS_PM2_NAME || 'cannabilize' }}
        run: |
          export APP_DIR="$VPS_APP_PATH" PM2_APP="$VPS_PM2_NAME"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$VPS_USER@$VPS_HOST" "APP_DIR=$VPS_APP_PATH PM2_APP=$VPS_PM2_NAME bash -s" < scripts/deploy-vps.sh
