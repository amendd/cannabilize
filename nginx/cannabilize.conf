# Nginx: proxy reverso para CannabiLize (Next.js na porta 3000)
# Coloque em: /etc/nginx/sites-available/cannabilize
# Ative com: sudo ln -s /etc/nginx/sites-available/cannabilize /etc/nginx/sites-enabled/

# Domínio: cannabilize.com.br

server {
    listen 80;
    listen [::]:80;

    server_name cannabilize.com.br www.cannabilize.com.br;

    # Logs
    access_log /var/log/nginx/cannabilize.access.log;
    error_log  /var/log/nginx/cannabilize.error.log;

    # Proxy para o Next.js (PM2 na porta 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Timeouts (evita 502 por conexão presa)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        # Buffers (evita 502 em respostas grandes)
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }
}
