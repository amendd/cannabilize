# Nginx: proxy reverso para CannabiLize — apenas IP (sem domínio)
# Use este arquivo para testar na porta 80 antes de configurar domínio.
# Coloque em: /etc/nginx/sites-available/cannabilize
# Ative com: sudo ln -s /etc/nginx/sites-available/cannabilize /etc/nginx/sites-enabled/

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    access_log /var/log/nginx/cannabilize.access.log;
    error_log  /var/log/nginx/cannabilize.error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }
}
