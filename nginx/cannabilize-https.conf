# Nginx: proxy reverso para CannabiLize (Next.js na porta 3000)
# Versão com HTTPS (Certbot). Use como referência na VPS.
# O Certbot adiciona/ajusta listen 443, ssl_* e o server block da porta 80.

# HTTPS (443)
server {
    server_name cannabilize.com.br www.cannabilize.com.br;

    access_log /var/log/nginx/cannabilize.access.log;
    error_log  /var/log/nginx/cannabilize.error.log;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Timeouts (evita 502 por conexão presa)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        # Buffers (evita 502 em respostas grandes, ex.: chunks JS)
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/cannabilize.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cannabilize.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP (80) — redirect para HTTPS (geralmente gerido pelo Certbot)
server {
    listen 80;
    listen [::]:80;
    server_name cannabilize.com.br www.cannabilize.com.br;
    return 301 https://$host$request_uri;
}
